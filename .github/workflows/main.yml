name: Main

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Run checks
        run: make check

  rust-core-unit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up the Python environment
        uses: ./.github/actions/setup-python-env

      - name: Check Rust core library
        run: cargo check -p mcp-compressor-core

      - name: Check Rust-backed Python extension crate
        run: cargo check -p mcp-compressor-python

      - name: Check Rust-backed Node extension crate
        run: cargo check -p mcp-compressor-node

      - name: Run Rust core library tests
        env:
          PYTHON: ${{ github.workspace }}/.venv/bin/python
        run: cargo test -p mcp-compressor-core --lib -- --nocapture

  rust-core-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up the Python environment
        uses: ./.github/actions/setup-python-env

      - name: Set up Bun for generated TypeScript client e2e
        uses: oven-sh/setup-bun@v2

      - name: Run Rust core integration tests
        env:
          PYTHON: ${{ github.workspace }}/.venv/bin/python
        run: |
          cargo test -p mcp-compressor-core --test compressed_server_stdio -- --nocapture
          cargo test -p mcp-compressor-core --test compression_levels -- --nocapture
          cargo test -p mcp-compressor-core --test config_sources -- --nocapture
          cargo test -p mcp-compressor-core --test multi_server -- --nocapture
          cargo test -p mcp-compressor-core --test proxy_http -- --nocapture
          cargo test -p mcp-compressor-core --test generated_clients -- --nocapture
          cargo test -p mcp-compressor-core --test cli_binary -- --nocapture
          cargo test -p mcp-compressor-core --test transform_modes -- --nocapture

  rust-binary-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up the Python environment
        uses: ./.github/actions/setup-python-env

      - name: Run Rust binary normal-mode FastMCP e2e
        run: uv run pytest -q tests/test_rust_core_normal_mode.py

  rust-contract-compile:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Compile all Rust core integration targets
        run: cargo test -p mcp-compressor-core --tests --no-run

  python-rust-package:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up root Python environment for fixture servers
        uses: ./.github/actions/setup-python-env

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Build native extension in editable mode
        working-directory: python/mcp-compressor-rust
        run: |
          uv sync --frozen --group dev
          uv run maturin develop

      - name: Run rust-backed Python package tests
        working-directory: python/mcp-compressor-rust
        env:
          PYTHON: ${{ github.workspace }}/.venv/bin/python
        run: uv run pytest -q tests

      - name: Run rust-backed Python package lint and type checks
        working-directory: python/mcp-compressor-rust
        run: |
          uv run ruff check mcp_compressor_rust tests
          uv run ty check --project . --python .venv mcp_compressor_rust tests

  check-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Check if documentation can be built
        run: uv run mkdocs build -s

  typescript:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Python environment (needed for e2e tests that launch Python fixture servers)
        uses: ./.github/actions/setup-python-env

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Rust core binary
        run: bun run build:core

      - name: Build Rust native addon
        run: bun run build:native

      - name: Run TypeScript package checks
        env:
          PYTHON: ${{ github.workspace }}/.venv/bin/python
        run: bun run check
