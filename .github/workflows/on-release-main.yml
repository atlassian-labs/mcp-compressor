name: release-main

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v1.2.3 or v0.15.0a1
        required: true
        type: string
      publish:
        description: Actually publish packages. Leave false for validation only.
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  publish-python-package:
    name: Publish Python package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Derive package version from tag
        id: version
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          VERSION="$(python scripts/prepare_python_release.py "$TAG")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing Python package at version $VERSION"

      - name: Build wheel and source distribution
        working-directory: python/mcp-compressor
        run: uvx maturin build --release --sdist --out dist

      - name: Smoke-test wheel
        shell: bash
        run: |
          python -m venv /tmp/mcp-compressor-python-publish-smoke
          VENV_PYTHON=/tmp/mcp-compressor-python-publish-smoke/bin/python
          "$VENV_PYTHON" -m pip install --upgrade pip
          "$VENV_PYTHON" -m pip install python/mcp-compressor/dist/*.whl
          mkdir -p /tmp/mcp-compressor-python-publish-import
          cd /tmp/mcp-compressor-python-publish-import
          "$VENV_PYTHON" - <<'PY'
          from mcp_compressor import CompressorClient, ToolSpec, compress_tool_listing
          listing = compress_tool_listing(
              "high",
              [ToolSpec(name="echo", description="Echo a message.", input_schema={"type": "object", "properties": {"message": {"type": "string"}}})],
          )
          assert "echo" in listing and "message" in listing
          assert CompressorClient is not None
          PY

      - name: Upload Python distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions-${{ steps.version.outputs.version }}
          path: python/mcp-compressor/dist/*

      - name: Stop before Python publish in validation mode
        if: github.event_name == 'workflow_dispatch' && inputs.publish != true
        run: echo "Python validation complete. Set publish=true or publish a GitHub release to publish to PyPI."

      - name: Publish to PyPI
        if: github.event_name == 'release' || inputs.publish == true
        working-directory: python/mcp-compressor
        run: uv publish --trusted-publishing always dist/*

  publish-typescript-package:
    name: Publish TypeScript package
    if: github.event_name == 'release' || inputs.publish == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Check out release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Prepare release branch
        id: prepare
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          if [ -z "$TAG" ]; then
            echo "Release tag is required" >&2
            exit 1
          fi
          printf '%s\n' "$TAG" > .release-tag
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .release-tag
          git commit -m "Prepare TypeScript release $TAG"
          RELEASE_SHA="$(git rev-parse HEAD)"
          git push origin HEAD:refs/heads/release --force
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "release_sha=$RELEASE_SHA" >> "$GITHUB_OUTPUT"

      - name: Wait for TypeScript publish workflow
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ steps.prepare.outputs.tag }}"
          RELEASE_SHA="${{ steps.prepare.outputs.release_sha }}"
          echo "Waiting for publish-typescript-package workflow on release branch for $TAG at $RELEASE_SHA"
          for attempt in $(seq 1 60); do
            RUN_JSON="$(gh run list \
              --workflow publish-typescript-package.yml \
              --branch release \
              --limit 1 \
              --json databaseId,status,conclusion,headSha \
              --jq '.[0] // empty')"
            if [ -z "$RUN_JSON" ]; then
              echo "No TypeScript publish run found yet (attempt $attempt/60)"
              sleep 20
              continue
            fi
            RUN_ID="$(jq -r '.databaseId' <<<"$RUN_JSON")"
            HEAD_SHA="$(jq -r '.headSha' <<<"$RUN_JSON")"
            STATUS="$(jq -r '.status' <<<"$RUN_JSON")"
            CONCLUSION="$(jq -r '.conclusion // ""' <<<"$RUN_JSON")"
            if [ "$HEAD_SHA" != "$RELEASE_SHA" ]; then
              echo "Latest TypeScript publish run $RUN_ID is for $HEAD_SHA, waiting for $RELEASE_SHA"
              sleep 20
              continue
            fi
            echo "Run $RUN_ID status=$STATUS conclusion=$CONCLUSION"
            if [ "$STATUS" = "completed" ]; then
              gh run view "$RUN_ID" --log-failed || true
              if [ "$CONCLUSION" = "success" ]; then
                exit 0
              fi
              echo "TypeScript publish workflow failed with conclusion=$CONCLUSION" >&2
              exit 1
            fi
            sleep 20
          done
          echo "Timed out waiting for TypeScript publish workflow" >&2
          exit 1

  publish-rust-crate:
    name: Publish Rust crates
    runs-on: ubuntu-latest
    steps:
      - name: Check out release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Derive crate version from tag
        id: version
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          VERSION="$(python scripts/prepare_rust_crate_release.py "$TAG")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing Rust crates at version $VERSION"

      - name: Refresh lockfile for tag-derived versions
        run: |
          cargo update -p mcp-compressor-core
          cargo update -p mcp-compressor

      - name: Validate patched public crate builds
        run: cargo check -p mcp-compressor --locked

      - name: Package core crate
        run: cargo package -p mcp-compressor-core --locked --allow-dirty

      - name: Publish core crate dry-run
        run: cargo publish -p mcp-compressor-core --locked --dry-run --allow-dirty

      - name: Stop before Rust publish in validation mode
        if: github.event_name == 'workflow_dispatch' && inputs.publish != true
        run: echo "Rust validation complete. Set publish=true or publish a GitHub release to publish crates."

      - name: Publish core crate
        if: github.event_name == 'release' || inputs.publish == true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p mcp-compressor-core --locked --allow-dirty

      - name: Wait for core crate in crates.io index
        if: github.event_name == 'release' || inputs.publish == true
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for attempt in {1..20}; do
            if cargo info "mcp-compressor-core@$VERSION" >/tmp/mcp-compressor-core-info 2>&1; then
              cat /tmp/mcp-compressor-core-info
              echo "mcp-compressor-core $VERSION is visible in crates.io index"
              exit 0
            fi
            cat /tmp/mcp-compressor-core-info || true
            echo "Waiting for mcp-compressor-core $VERSION in crates.io index (attempt $attempt/20)..."
            sleep 30
          done
          echo "Timed out waiting for mcp-compressor-core $VERSION in crates.io index" >&2
          exit 1

      - name: Package public crate
        if: github.event_name == 'release' || inputs.publish == true
        run: cargo package -p mcp-compressor --locked --allow-dirty

      - name: Publish public crate dry-run
        if: github.event_name == 'release' || inputs.publish == true
        run: cargo publish -p mcp-compressor --locked --dry-run --allow-dirty

      - name: Publish public crate
        if: github.event_name == 'release' || inputs.publish == true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p mcp-compressor --locked --allow-dirty

  deploy-docs:
    name: Deploy docs
    permissions:
      contents: write
    needs:
      - publish-python-package
      - publish-typescript-package
      - publish-rust-crate
    if: github.event_name == 'release' || inputs.publish == true
    runs-on: ubuntu-latest
    steps:
      - name: Check out release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Deploy documentation
        run: uv run mkdocs gh-deploy --force
