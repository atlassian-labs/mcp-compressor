name: release-main

on:
  release:
    types: [published]

jobs:
  set-version:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Export tag
        id: vars
        run: echo tag=${GITHUB_REF#refs/*/} >> $GITHUB_OUTPUT
        if: ${{ github.event_name == 'release' }}

      - name: Update project version
        run: |
          sed -i "s/^version = \".*\"/version = \"$RELEASE_VERSION\"/" pyproject.toml
        env:
          RELEASE_VERSION: ${{ steps.vars.outputs.tag }}
        if: ${{ github.event_name == 'release' }}

      - name: Upload updated pyproject.toml
        uses: actions/upload-artifact@v4
        with:
          name: pyproject-toml
          path: pyproject.toml

  publish:
    runs-on: ubuntu-latest
    needs: [set-version]
    permissions:
      id-token: write
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Download updated pyproject.toml
        uses: actions/download-artifact@v4
        with:
          name: pyproject-toml

      - name: Build package
        run: uv build

      - name: Publish package
        run: uv publish --trusted-publishing always

  publish-typescript-internal:
    runs-on: ubuntu-latest
    needs: [set-version]
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: typescript
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Export tag
        id: vars
        run: echo tag=${GITHUB_REF#refs/*/} >> $GITHUB_OUTPUT

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Stamp package version
        run: |
          node -e "const fs=require('fs'); const file='package.json'; const pkg=JSON.parse(fs.readFileSync(file,'utf8')); pkg.version=process.argv[1]; fs.writeFileSync(file, JSON.stringify(pkg, null, 2)+'\\n');" "${{ steps.vars.outputs.tag }}"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run checks
        run: bun run check:ci

      - name: Build package
        run: bun run build

      - name: Get Artifact Publish Token
        id: publish-token
        uses: atlassian-labs/artifact-publish-token@v1.0.1
        with:
          output-modes: environment

      - name: Configure .npmrc for internal registry
        run: |
          printf '@atlassian:registry=https://packages.atlassian.com/api/npm/atlassian-npm/\n' > ${{ github.workspace }}/.npmrc-internal
          printf '//packages.atlassian.com/api/npm/atlassian-npm/:_password=%s\n' "${ARTIFACTORY_PASSWORD_BASE64}" >> ${{ github.workspace }}/.npmrc-internal
          printf '//packages.atlassian.com/api/npm/atlassian-npm/:username=%s\n' "${ARTIFACTORY_USERNAME}" >> ${{ github.workspace }}/.npmrc-internal
          printf '//packages.atlassian.com/api/npm/atlassian-npm/:always-auth=true\n' >> ${{ github.workspace }}/.npmrc-internal
          chmod 600 ${{ github.workspace }}/.npmrc-internal

      - name: Publish package to Atlassian internal registry
        run: npm publish --userconfig ${{ github.workspace }}/.npmrc-internal

  deploy-docs:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Deploy documentation
        run: uv run mkdocs gh-deploy --force
