name: release-main

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v1.2.3 or v0.15.0a1
        required: true
        type: string
      publish:
        description: Actually publish packages. Leave false for validation only.
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  publish-python-package:
    name: Publish Python package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Derive package version from tag
        id: version
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          VERSION="$(python scripts/prepare_python_release.py "$TAG")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing Python package at version $VERSION"

      - name: Build wheel and source distribution
        working-directory: python/mcp-compressor
        run: uvx maturin build --release --sdist --out dist

      - name: Smoke-test wheel
        shell: bash
        run: |
          python -m venv /tmp/mcp-compressor-python-publish-smoke
          VENV_PYTHON=/tmp/mcp-compressor-python-publish-smoke/bin/python
          "$VENV_PYTHON" -m pip install --upgrade pip
          "$VENV_PYTHON" -m pip install python/mcp-compressor/dist/*.whl
          mkdir -p /tmp/mcp-compressor-python-publish-import
          cd /tmp/mcp-compressor-python-publish-import
          "$VENV_PYTHON" - <<'PY'
          from mcp_compressor import CompressorClient, ToolSpec, compress_tool_listing
          listing = compress_tool_listing(
              "high",
              [ToolSpec(name="echo", description="Echo a message.", input_schema={"type": "object", "properties": {"message": {"type": "string"}}})],
          )
          assert "echo" in listing and "message" in listing
          assert CompressorClient is not None
          PY

      - name: Upload Python distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions-${{ steps.version.outputs.version }}
          path: python/mcp-compressor/dist/*

      - name: Stop before Python publish in validation mode
        if: github.event_name == 'workflow_dispatch' && inputs.publish != true
        run: echo "Python validation complete. Set publish=true or publish a GitHub release to publish to PyPI."

      - name: Publish to PyPI
        if: github.event_name == 'release' || inputs.publish == true
        working-directory: python/mcp-compressor
        run: uv publish --trusted-publishing always dist/*

  publish-typescript-package:
    name: Publish TypeScript package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: typescript
    steps:
      - name: Check out release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python environment for fixture servers
        uses: ./.github/actions/setup-python-env

      - name: Derive package version from tag
        id: version
        working-directory: .
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          VERSION="$(python scripts/prepare_typescript_release.py "$TAG")"
          DIST_TAG="$(python scripts/prepare_typescript_release.py "$TAG" --print-npm-dist-tag)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dist_tag=$DIST_TAG" >> "$GITHUB_OUTPUT"
          echo "Publishing TypeScript package at version $VERSION with npm tag $DIST_TAG"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build native addon and CLI binary for checks
        run: |
          bun run build:native
          cargo build -p mcp-compressor --bin mcp-compressor

      - name: Run package checks
        env:
          MCP_COMPRESSOR_CORE_BINARY: ${{ github.workspace }}/target/debug/mcp-compressor
          PYTHON: ${{ github.workspace }}/.venv/bin/python
        run: bun run check:ci

      - name: Build TypeScript package and native addon
        run: |
          bun run build
          bun run build:native

      - name: Pack package
        shell: bash
        run: bun pm pack --filename /tmp/mcp-compressor-typescript-package.tgz

      - name: Smoke-test packed package
        shell: bash
        working-directory: .
        run: |
          mkdir -p /tmp/mcp-compressor-typescript-publish-smoke
          cd /tmp/mcp-compressor-typescript-publish-smoke
          printf '{"type":"module"}\n' > package.json
          npm install --registry https://registry.npmjs.org /tmp/mcp-compressor-typescript-package.tgz
          node --input-type=module -e 'import { CompressorClient, compressToolListing } from "@atlassian/mcp-compressor"; if (typeof CompressorClient !== "function") throw new Error("CompressorClient missing"); const listing = compressToolListing("high", [{ name: "echo", inputSchema: { type: "object", properties: { message: { type: "string" } } } }]); if (!listing.includes("echo") || !listing.includes("message")) throw new Error(`bad listing: ${listing}`);'

      - name: Upload packed package
        uses: actions/upload-artifact@v4
        with:
          name: typescript-package-${{ steps.version.outputs.version }}
          path: /tmp/mcp-compressor-typescript-package.tgz

      - name: Stop before TypeScript publish in validation mode
        if: github.event_name == 'workflow_dispatch' && inputs.publish != true
        run: echo "TypeScript validation complete. Set publish=true or publish a GitHub release to publish to npm-public."

      - name: Get Artifact Publish Token
        if: github.event_name == 'release' || inputs.publish == true
        id: publish-token
        uses: atlassian-labs/artifact-publish-token@v1.0.1
        with:
          output-modes: npm

      - name: Publish to Artifactory npm-public
        if: github.event_name == 'release' || inputs.publish == true
        run: npm publish /tmp/mcp-compressor-typescript-package.tgz --access public --tag "${{ steps.version.outputs.dist_tag }}" --userconfig "${{ github.workspace }}/.npmrc-public"

  publish-rust-crate:
    name: Publish Rust crates
    runs-on: ubuntu-latest
    steps:
      - name: Check out release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Derive crate version from tag
        id: version
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          VERSION="$(python scripts/prepare_rust_crate_release.py "$TAG")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing Rust crates at version $VERSION"

      - name: Refresh lockfile for tag-derived versions
        run: |
          cargo update -p mcp-compressor-core
          cargo update -p mcp-compressor

      - name: Validate patched public crate builds
        run: cargo check -p mcp-compressor --locked

      - name: Package core crate
        run: cargo package -p mcp-compressor-core --locked --allow-dirty

      - name: Publish core crate dry-run
        run: cargo publish -p mcp-compressor-core --locked --dry-run --allow-dirty

      - name: Stop before Rust publish in validation mode
        if: github.event_name == 'workflow_dispatch' && inputs.publish != true
        run: echo "Rust validation complete. Set publish=true or publish a GitHub release to publish crates."

      - name: Publish core crate
        if: github.event_name == 'release' || inputs.publish == true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p mcp-compressor-core --locked --allow-dirty

      - name: Wait for core crate in crates.io index
        if: github.event_name == 'release' || inputs.publish == true
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for attempt in {1..20}; do
            if cargo info "mcp-compressor-core@$VERSION" >/tmp/mcp-compressor-core-info 2>&1; then
              cat /tmp/mcp-compressor-core-info
              echo "mcp-compressor-core $VERSION is visible in crates.io index"
              exit 0
            fi
            cat /tmp/mcp-compressor-core-info || true
            echo "Waiting for mcp-compressor-core $VERSION in crates.io index (attempt $attempt/20)..."
            sleep 30
          done
          echo "Timed out waiting for mcp-compressor-core $VERSION in crates.io index" >&2
          exit 1

      - name: Package public crate
        if: github.event_name == 'release' || inputs.publish == true
        run: cargo package -p mcp-compressor --locked --allow-dirty

      - name: Publish public crate dry-run
        if: github.event_name == 'release' || inputs.publish == true
        run: cargo publish -p mcp-compressor --locked --dry-run --allow-dirty

      - name: Publish public crate
        if: github.event_name == 'release' || inputs.publish == true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p mcp-compressor --locked --allow-dirty

  deploy-docs:
    name: Deploy docs
    permissions:
      contents: write
    needs:
      - publish-python-package
      - publish-typescript-package
      - publish-rust-crate
    if: github.event_name == 'release' || inputs.publish == true
    runs-on: ubuntu-latest
    steps:
      - name: Check out release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Deploy documentation
        run: uv run mkdocs gh-deploy --force
