name: Release Artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version label for artifact names, e.g. 0.4.0-rc.1
        required: false
        type: string
  push:
    branches:
      - rust-core-migration-trunk
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - rust-core-migration-trunk

permissions:
  contents: read

jobs:
  rust-cli-binary:
    name: Rust CLI binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact-suffix: linux-x86_64
            binary-name: mcp-compressor
          - os: macos-latest
            artifact-suffix: macos-arm64
            binary-name: mcp-compressor
          - os: windows-latest
            artifact-suffix: windows-x86_64
            binary-name: mcp-compressor.exe
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: artifacts-${{ matrix.artifact-suffix }}

      - name: Build Rust CLI binary
        run: cargo build -p mcp-compressor-core --release

      - name: Smoke-test Rust CLI binary
        shell: bash
        run: |
          "target/release/${{ matrix.binary-name }}" --help

      - name: Stage binary artifact
        shell: bash
        run: |
          VERSION="${{ inputs.version || github.sha }}"
          mkdir -p dist
          cp "target/release/${{ matrix.binary-name }}" "dist/mcp-compressor-${{ matrix.artifact-suffix }}-${VERSION}"

      - name: Upload Rust CLI binary
        uses: actions/upload-artifact@v4
        with:
          name: rust-cli-binary-${{ matrix.artifact-suffix }}
          path: dist/mcp-compressor-${{ matrix.artifact-suffix }}-*

  python-wheel:
    name: Python wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact-suffix: linux-x86_64
          - os: macos-latest
            artifact-suffix: macos-arm64
          - os: windows-latest
            artifact-suffix: windows-x86_64
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: artifacts-${{ matrix.artifact-suffix }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Build Rust-backed Python wheel
        working-directory: python/mcp-compressor
        run: uvx maturin build --release --out dist

      - name: Smoke-test wheel from clean directory
        shell: bash
        run: |
          python -m venv /tmp/mcp-compressor-wheel-test
          if [ -x /tmp/mcp-compressor-wheel-test/Scripts/python.exe ]; then
            VENV_PYTHON=/tmp/mcp-compressor-wheel-test/Scripts/python.exe
          else
            VENV_PYTHON=/tmp/mcp-compressor-wheel-test/bin/python
          fi
          "$VENV_PYTHON" -m pip install --upgrade pip
          "$VENV_PYTHON" -m pip install "${{ github.workspace }}"/python/mcp-compressor/dist/*.whl
          mkdir -p /tmp/mcp-compressor-wheel-import-test
          cd /tmp/mcp-compressor-wheel-import-test
          "$VENV_PYTHON" - <<'PY'
          from mcp_compressor import CompressorClient, ToolSpec, compress_tool_listing
          listing = compress_tool_listing(
              "high",
              [ToolSpec(name="echo", description="Echo a message.", input_schema={"type": "object", "properties": {"message": {"type": "string"}}})],
          )
          assert "echo" in listing and "message" in listing
          assert CompressorClient is not None
          PY

      - name: Upload Python wheel
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel-${{ matrix.artifact-suffix }}
          path: python/mcp-compressor/dist/*.whl

  typescript-package:
    name: TypeScript package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact-suffix: linux-x86_64
          - os: macos-latest
            artifact-suffix: macos-arm64
          - os: windows-latest
            artifact-suffix: windows-x86_64
    defaults:
      run:
        working-directory: typescript
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: artifacts-${{ matrix.artifact-suffix }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build TypeScript package and native addon
        run: |
          bun run build
          bun run build:native

      - name: Pack package
        shell: bash
        run: bun pm pack --filename /tmp/mcp-compressor-typescript-package.tgz

      - name: Smoke-test packed package
        shell: bash
        run: |
          rm -rf /tmp/mcp-compressor-typescript-package-test
          mkdir -p /tmp/mcp-compressor-typescript-package-test
          cd /tmp/mcp-compressor-typescript-package-test
          printf '{"type":"module"}\n' > package.json
          npm install --registry https://registry.npmjs.org /tmp/mcp-compressor-typescript-package.tgz
          node --input-type=module -e 'import { CompressorClient, createJustBashCommands, compressToolListing } from "@atlassian/mcp-compressor"; if (typeof CompressorClient !== "function") throw new Error("CompressorClient missing"); if (typeof createJustBashCommands !== "function") throw new Error("createJustBashCommands missing"); const listing = compressToolListing("high", [{ name: "echo", inputSchema: { type: "object", properties: { message: { type: "string" } } } }]); if (!listing.includes("echo") || !listing.includes("message")) throw new Error(`bad listing: ${listing}`);'

      - name: Upload TypeScript package
        uses: actions/upload-artifact@v4
        with:
          name: typescript-package-${{ matrix.artifact-suffix }}
          path: /tmp/mcp-compressor-typescript-package.tgz
