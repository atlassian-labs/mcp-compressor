name: publish-typescript

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish (e.g. 0.3.0)
        required: true
        type: string

jobs:
  publish-typescript:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: typescript
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Stamp package version
        run: |
          node -e "const fs=require('fs'); const file='package.json'; const pkg=JSON.parse(fs.readFileSync(file,'utf8')); pkg.version=process.argv[1]; fs.writeFileSync(file, JSON.stringify(pkg, null, 2)+'\\n');" "${{ inputs.version }}"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run check

      - name: Get Artifact Publish Token
        id: publish-token
        uses: atlassian-labs/artifact-publish-token@v1.0.1
        with:
          output-modes: npm

      - name: Publish package
        run: npm publish
        env:
          NPM_CONFIG_USERCONFIG: ${{ github.workspace }}/.npmrc-public
